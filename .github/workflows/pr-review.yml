name: PR Review Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  # ── Phase 1: Spawn 6 parallel reviewers ──────────────────────────
  review:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        reviewer:
          - security
          - performance
          - type-safety
          - a11y
          - test-coverage
          - docs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff context
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          FILES=$(git diff origin/${{ github.base_ref }}...HEAD --name-only)
          STAT=$(git diff origin/${{ github.base_ref }}...HEAD --stat)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "stat<<EOF" >> $GITHUB_OUTPUT
          echo "$STAT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run ${{ matrix.reviewer }} reviewer
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the **${{ matrix.reviewer }} reviewer** for a pull request.
            Read the agent prompt at `.claude/review-agents/${{ matrix.reviewer }}.md` and follow it exactly.

            Changed files:
            ${{ steps.diff.outputs.files }}

            Diff stat:
            ${{ steps.diff.outputs.stat }}

            Process:
            1. Read ONLY the changed files (use git diff to see actual changes)
            2. Apply your review criteria from the agent prompt
            3. Output a JSON array of findings to .claude/review-results/${{ matrix.reviewer }}.json
            4. Each finding: {severity, file, line, suggestion, auto_fixable, category}
            5. If no findings, output an empty array []

            IMPORTANT: Output ONLY valid JSON. No markdown fences, no commentary outside the JSON.
          max_turns: 15

      - name: Upload review results
        uses: actions/upload-artifact@v4
        with:
          name: review-${{ matrix.reviewer }}
          path: .claude/review-results/${{ matrix.reviewer }}.json
          retention-days: 7

  # ── Phase 2: Coordinate results ──────────────────────────────────
  coordinate:
    needs: review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.HEALING_PAT || secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Download all review artifacts
        uses: actions/download-artifact@v4
        with:
          path: .claude/review-results
          pattern: review-*
          merge-multiple: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run coordinator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: node .claude/review-agents/coordinator.mjs

      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: review-metrics
          path: .claude/review-metrics.json
          retention-days: 30
