name: PR Review Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: write

env:
  GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}

jobs:
  # ── Phase 1: Spawn 6 parallel reviewers via Gemini ────────────
  review:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        reviewer:
          - security
          - performance
          - type-safety
          - a11y
          - test-coverage
          - docs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run ${{ matrix.reviewer }} reviewer (Gemini)
        env:
          REVIEWER: ${{ matrix.reviewer }}
          BASE_REF: ${{ github.base_ref }}
        run: node .claude/review-agents/gemini-reviewer.mjs

      - name: Upload review results
        uses: actions/upload-artifact@v4
        with:
          name: review-${{ matrix.reviewer }}
          path: .claude/review-results/${{ matrix.reviewer }}.json
          retention-days: 7

  # ── Phase 2: Coordinate results ───────────────────────────────
  coordinate:
    needs: review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.HEALING_PAT || secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Download all review artifacts
        uses: actions/download-artifact@v4
        with:
          path: .claude/review-results
          pattern: review-*
          merge-multiple: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run coordinator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: node .claude/review-agents/coordinator.mjs

      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: review-metrics
          path: .claude/review-metrics.json
          retention-days: 30
