name: PR Review Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        reviewer:
          - security
          - performance
          - type-safety
          - a11y
          - test-coverage
          - docs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect diff range
        id: diff
        run: |
          if [ "${{ github.event.action }}" = "synchronize" ]; then
            echo "range=${{ github.event.before }}..${{ github.event.after }}" >> $GITHUB_OUTPUT
          else
            echo "range=$(git merge-base origin/${{ github.base_ref }} HEAD)..HEAD" >> $GITHUB_OUTPUT
          fi
          FILES=$(git diff ${{ steps.diff.outputs.range }} --name-only || git diff origin/${{ github.base_ref }}...HEAD --name-only)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run ${{ matrix.reviewer }} reviewer (Gemini)
        timeout-minutes: 3
        env:
          REVIEWER: ${{ matrix.reviewer }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DIFF_RANGE: ${{ steps.diff.outputs.range }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: node .claude/review-agents/gemini-reviewer.mjs

      - name: Upload review results
        uses: actions/upload-artifact@v4
        with:
          name: review-${{ matrix.reviewer }}
          path: .claude/review-results/${{ matrix.reviewer }}.json
          retention-days: 7

  coordinate:
    needs: review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.HEALING_PAT || secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Download all review artifacts
        uses: actions/download-artifact@v4
        with:
          path: .claude/review-results
          pattern: review-*
          merge-multiple: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run coordinator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: node .claude/review-agents/coordinator.mjs

      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: review-metrics
          path: |
            .claude/review-metrics.json
            .claude/review-results/badge.json
          retention-days: 30
